<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트빵 🍞 | 심심할 때 하는 무료 성격 테스트 모음</title>
<meta name="description" content="1분이면 끝나는 무료 성격 테스트 모음. 심심할 때 딱 좋은 테스트빵에서 나에게 맞는 걸 골라 해보세요.">
<meta name="keywords" content="무료 성격테스트, 심심풀이 테스트, 재밌는 테스트 모음, 온라인 테스트, 테스트빵">
<meta property="og:type" content="website">
<meta property="og:title" content="테스트빵 🍞 심심할 때 하는 테스트 모음">
<meta property="og:description" content="1분이면 끝나는 무료 성격 테스트들. 하나씩 골라 먹듯 가볍게 즐겨보세요.">
<meta name="twitter:card" content="summary_large_image">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8471384112148064"
     crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fdf8f0;
    --surface: #ffffff;
    --ink: #3a2e1f;
    --ink-soft: #8a7a63;
    --line: #ecdfc7;
    --accent: #c9974a;
    --accent-deep: #a8762e;
    --accent-soft: #f6e8ce;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    line-height: 1.6;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 16px 60px; }
  header { text-align: center; padding: 8px 0 28px; }
  .eyebrow { font-size: 13px; letter-spacing: .1em; color: var(--accent-deep); font-weight: 700; margin: 0; }
  h1 { font-size: 30px; margin: 10px 0 6px; line-height: 1.3; }
  .sub { color: var(--ink-soft); font-size: 15px; margin: 0; }
  .ad-slot { display: none; }
  .list { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .test-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; padding: 18px 20px;
    text-decoration: none; color: inherit;
    box-shadow: 0 2px 10px rgba(120, 90, 40, .06);
    transition: transform .15s, box-shadow .15s;
  }
  .test-card:hover, .test-card:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(120, 90, 40, .12);
    outline: none;
  }
  .test-emoji {
    flex: none; width: 56px; height: 56px; border-radius: 14px;
    background: var(--accent-soft); display: flex; align-items: center; justify-content: center;
    font-size: 30px;
  }
  .test-info { flex: 1; min-width: 0; }
  .test-tag { font-size: 12px; color: var(--accent-deep); font-weight: 700; margin: 0 0 3px; }
  .test-title { font-size: 17px; font-weight: 800; margin: 0 0 3px; }
  .test-desc { font-size: 13px; color: var(--ink-soft); margin: 0; }
  .test-arrow { flex: none; font-size: 20px; color: var(--accent); }
  .coming-soon {
    text-align: center; padding: 28px 16px; margin-top: 4px;
    border: 1.5px dashed var(--line); border-radius: 16px;
    color: var(--ink-soft); font-size: 13px;
  }
  footer { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 44px; }
  footer a { color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">FREE TEST · 무료 테스트 모음</p>
    <h1>테스트빵 🍞</h1>
    <p class="sub">심심할 때 하나씩 골라 먹는 1분 테스트</p>
  </header>

  <!-- [애드센스 광고 자리 - 본문 상단] -->
  <div class="ad-slot">광고 영역 (애드센스 승인 후 표시)</div>

  <div class="list" id="test-list"></div>

  <div class="coming-soon">🥐 다음 테스트도 곧 구워서 올게요</div>

  <footer>
    <p>© 2026 테스트빵 · 재미로 보는 테스트입니다</p>
    <p><a href="about.html">소개</a> · <a href="privacy.html">개인정보처리방침</a></p>
  </footer>
</div>

<script>
  const TESTS = [
    {
      emoji: "🐶",
      tag: "성격 테스트 · 1분",
      title: "내 성격에 맞는 강아지 종류 테스트",
      desc: "12가지 질문으로 찾는 나에게 딱 맞는 반려견",
      url: "dog-test/"
    }
  ];

  const list = document.getElementById("test-list");
  TESTS.forEach(t => {
    const a = document.createElement("a");
    a.className = "test-card";
    a.href = t.url;
    a.innerHTML = `
      <div class="test-emoji">${t.emoji}</div>
      <div class="test-info">
        <p class="test-tag">${t.tag}</p>
        <p class="test-title">${t.title}</p>
        <p class="test-desc">${t.desc}</p>
      </div>
      <div class="test-arrow">→</div>
    `;
    list.appendChild(a);
  });
</script>
</body>
</html>
