<script id="app-source" type="text/plain">
const { useState, useRef, useEffect, useCallback } = React;

const LINES = {
  intro: ["어서와, 눈썰미 좀 있나?", "기회는 딱 3번이야"],
  reveal: ["네 운명을 결정할 패니깐 잘 봐둬", "딱 한 번만 보여준다", "흘러간 패는 다시 돌아오지 않아"],
  shuffle: ["쿵짝짝 쿵짝짝", "여기서부터 기술 들어가는 거야", "손은 눈보다 빠르니깐"],
  guess: ["이길 수 있겠냐 고니야, 담배 하나 찔러봐"],
  correct: ["좋은 눈을 가졌어", "기술 쓴 거야?", "이거 아주 타짜구만"],
  wrong: ["눈이 좀 침침해?", "틀렸쥬?", "싸늘하지?"],
  gameover: ["이 바닥엔 영원한 고수가 없다고 했던가", "여기서 그만두면 타짜가 아니지"],
  win: ["애초에 속을 수가 없었군", "내가 본 타짜 중에 최고구만"],
};
const CONFETTI = ["🎉", "✨", "🃏", "🏆", "⭐", "🎉", "✨", "🃏", "🏆", "⭐", "🎉", "✨"];
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const delay = (ms) => new Promise((res) => setTimeout(res, ms));

const CARD_W = 68;
const CARD_GAP = 12;
const BOARD_W = 308;

// 레벨 6부터 카드 한 장 늘어나서 확률·셔플 둘 다 빡세짐 (Lv.1~5=3장, Lv.6~10=4장)
function cardCountForLevel(level) {
  return level >= 6 ? 4 : 3;
}

function getSlotX(count) {
  const totalW = count * CARD_W + (count - 1) * CARD_GAP;
  const offset = (BOARD_W - totalW) / 2;
  return Array.from({ length: count }, (_, i) => offset + i * (CARD_W + CARD_GAP));
}

function makeRound(count) {
  const winnerId = Math.floor(Math.random() * count);
  return Array.from({ length: count }, (_, id) => ({ id, slot: id, isWinner: id === winnerId }));
}

// 웹오디오로 합성한 레트로 삑삑이 효과음 (외부 파일 다운로드 없이 즉시 재생)
let audioCtx = null;
function beep(freq, duration, type = "square", startGain = 0.06) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(startGain, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch (e) { /* 오디오 컨텍스트 미지원 브라우저는 조용히 무시 */ }
}
const sfx = {
  tick: () => beep(320, 0.05, "square", 0.04),
  correct: () => { beep(660, 0.1); setTimeout(() => beep(880, 0.14), 90); setTimeout(() => beep(1180, 0.18), 180); },
  wrong: () => { beep(180, 0.22, "sawtooth", 0.08); setTimeout(() => beep(120, 0.28, "sawtooth", 0.07), 120); },
  levelup: () => { beep(520, 0.09); setTimeout(() => beep(780, 0.09), 90); setTimeout(() => beep(1040, 0.16), 180); },
};

// ── 공유 기능 헬퍼 (신조어 테스트와 동일한 패턴: 캔버스 결과 카드 + Web Share API) ──
function dataURLtoBlob(dataUrl) {
  const parts = dataUrl.split(",");
  const mime = (parts[0].match(/:(.*?);/) || [, "image/png"])[1];
  const binary = atob(parts[1]);
  const u8arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) u8arr[i] = binary.charCodeAt(i);
  return new Blob([u8arr], { type: mime });
}

function isTouchDevice() {
  return navigator.maxTouchPoints > 0 || "ontouchstart" in window;
}

// 결과 카드를 Canvas에 직접 그려서 공유용 이미지 생성 (외부 라이브러리 불필요)
function drawShareCanvas(won, level, shareUrl) {
  const canvas = document.createElement("canvas");
  const W = 1080, H = 1350;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const cx = W / 2;

  ctx.fillStyle = "#160b24";
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = "#00fff2";
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.roundRect(40, 40, W - 80, H - 80, 28);
  ctx.stroke();

  ctx.textAlign = "center";
  ctx.fillStyle = "#fbff00";
  ctx.font = "bold 52px 'Malgun Gothic', sans-serif";
  ctx.fillText("🃏 야바위 아저씨 🃏", cx, 170);

  ctx.font = "230px sans-serif";
  ctx.textBaseline = "middle";
  ctx.fillText(won ? "🏆" : "💔", cx, 460);
  ctx.textBaseline = "alphabetic";

  ctx.fillStyle = won ? "#fbff00" : "#ff3b3b";
  ctx.font = "bold 84px 'Malgun Gothic', sans-serif";
  ctx.fillText(won ? "전설의 타짜" : "STAGE " + level + " 광탈", cx, 710);

  ctx.fillStyle = "#eaeaf2";
  ctx.font = "40px 'Malgun Gothic', sans-serif";
  ctx.fillText(won ? "STAGE 10 올클리어!" : "손은 눈보다 빠르니깐…", cx, 790);

  ctx.font = "90px sans-serif";
  ctx.fillText(won ? "🍀 🍀 🍀" : "❌ 🍀 ❌", cx, 950);

  ctx.fillStyle = "#9b8fb5";
  ctx.font = "34px 'Malgun Gothic', sans-serif";
  ctx.fillText(won ? "이 구역 야바위는 내가 평정했다" : "클로버가 손끝에서 사라졌다…", cx, 1050);

  ctx.fillStyle = "#00fff2";
  ctx.fillRect(0, H - 150, W, 150);
  ctx.fillStyle = "#0b1a18";
  ctx.font = "bold 40px 'Malgun Gothic', sans-serif";
  ctx.fillText("나도 야바위 하러가기 →", cx, H - 88);
  ctx.font = "28px 'Malgun Gothic', sans-serif";
  ctx.fillText(shareUrl.replace(/^https?:\/\//, ""), cx, H - 42);

  return canvas;
}

function App() {
  const [level, setLevel] = useState(1);
  const [hearts, setHearts] = useState(3);
  const [phase, setPhase] = useState("idle"); // idle | showcase | reveal | hide | shuffle | guess | result | gameover | win
  const [cards, setCards] = useState(makeRound(cardCountForLevel(1)));
  const [message, setMessage] = useState(pick(LINES.intro));
  const [pickedId, setPickedId] = useState(null);
  const [taunting, setTaunting] = useState(false);
  const [shareOpen, setShareOpen] = useState(false);
  const [previewImg, setPreviewImg] = useState(null);
  const [toast, setToast] = useState("");
  const toastTimer = useRef(null);

  const roundToken = useRef(0);

  // Lv.6까지는 매 레벨 12%씩 빨라지고, Lv.7부터는 6%씩만 (7부터 극단적이라는 피드백 반영)
  const swapDurationMs = level <= 6
    ? Math.round(650 * Math.pow(0.88, level - 1))
    : Math.round(650 * Math.pow(0.88, 5) * Math.pow(0.94, level - 6));
  // 섞는 횟수도 Lv.7부터는 +2가 아니라 +1씩만 증가
  const swapCount = level <= 6 ? 5 + level * 2 : 17 + (level - 6);
  // 카드가 자리를 옮기는 슬라이드 자체는 스왑 간격의 78% 정도로, 스냅되지 않고 부드럽게 흐르듯 이동
  const cardTransitionMs = Math.max(90, Math.round(swapDurationMs * 0.78));

  const shuffle = useCallback(async (myToken, startCards) => {
    let arr = startCards.map((c) => ({ ...c }));
    const count = arr.length;
    for (let i = 0; i < swapCount; i++) {
      if (roundToken.current !== myToken) return arr;
      let a = Math.floor(Math.random() * count);
      let b = Math.floor(Math.random() * count);
      while (b === a) b = Math.floor(Math.random() * count);
      const ca = arr.find((c) => c.slot === a);
      const cb = arr.find((c) => c.slot === b);
      ca.slot = b;
      cb.slot = a;
      arr = arr.map((c) => ({ ...c }));
      sfx.tick();
      setCards(arr);
      await delay(swapDurationMs);
    }
    return arr;
  }, [swapCount, swapDurationMs]);

  const startRound = useCallback(async (targetLevel) => {
    const myToken = ++roundToken.current;
    const round = makeRound(cardCountForLevel(targetLevel));
    setPickedId(null);
    setCards(round);
    // 당첨 클로버를 가운데에 크게 보여준 다음, 제자리로 들어가는 것까지 보여주고 나서 뒤집는다
    setPhase("showcase");
    setMessage(pick(LINES.reveal));

    await delay(1200);
    if (roundToken.current !== myToken) return;

    setPhase("reveal");
    await delay(1150);
    if (roundToken.current !== myToken) return;

    setPhase("hide");
    await delay(450);
    if (roundToken.current !== myToken) return;

    setPhase("shuffle");
    setMessage(pick(LINES.shuffle));
    const shuffled = await shuffle(myToken, round);
    if (roundToken.current !== myToken) return;

    setCards(shuffled);
    setPhase("guess");
    setMessage(pick(LINES.guess));
  }, [shuffle]);

  const handleStart = () => {
    setLevel(1);
    setHearts(3);
    startRound(1);
  };

  const handleRetry = () => {
    setHearts(3);
    setLevel(1);
    startRound(1);
  };

  const handlePick = (cardId) => {
    if (phase !== "guess") return;
    const myToken = roundToken.current;
    const card = cards.find((c) => c.id === cardId);
    setPickedId(cardId);
    setPhase("result");

    if (card.isWinner) {
      sfx.correct();
      setMessage(pick(LINES.correct));
      setTaunting(false);
      (async () => {
        await delay(1400);
        if (roundToken.current !== myToken) return;
        if (level >= 10) {
          setMessage(pick(LINES.win));
          setPhase("win");
        } else {
          sfx.levelup();
          const next = level + 1;
          setLevel(next);
          startRound(next);
        }
      })();
    } else {
      sfx.wrong();
      setMessage(pick(LINES.wrong));
      setTaunting(true);
      setTimeout(() => setTaunting(false), 500);
      const remaining = hearts - 1;
      setHearts(remaining);
      (async () => {
        await delay(1400);
        if (roundToken.current !== myToken) return;
        if (remaining <= 0) {
          setMessage(pick(LINES.gameover));
          setPhase("gameover");
        } else {
          startRound(level);
        }
      })();
    }
  };

  // ── 공유하기 ──
  const showToast = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2600);
  };
  const shareUrl = () => location.origin + location.pathname;
  const shareText = () => phase === "win"
    ? "🃏 야바위 아저씨 STAGE 10 올클리어! 나 전설의 타짜 인증 🏆"
    : "🃏 야바위 아저씨 STAGE " + level + "에서 광탈… 아저씨 손이 너무 빠르다. 너는 깰 수 있냐?";
  const copyShareLink = () => {
    const full = shareText() + "\n" + shareUrl();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(full)
        .then(() => showToast("링크가 복사됐어요! 아무 데나 붙여넣으세요 📋"))
        .catch(() => prompt("아래 내용을 복사해서 공유하세요:", full));
    } else {
      prompt("아래 내용을 복사해서 공유하세요:", full);
    }
  };
  const handleShareLink = () => {
    const full = shareText() + "\n" + shareUrl();
    if (!navigator.share) { copyShareLink(); return; }
    navigator.share({ title: "야바위 아저씨", text: full }).catch((err) => {
      if (err && err.name !== "AbortError") copyShareLink();
    });
  };
  const handleShareImage = async () => {
    const full = shareText() + "\n" + shareUrl();
    if (!navigator.share) { copyShareLink(); return; }
    let fileData = null;
    try {
      const dataUrl = drawShareCanvas(phase === "win", level, shareUrl()).toDataURL("image/png");
      const file = new File([dataURLtoBlob(dataUrl)], "yabawi-result.png", { type: "image/png" });
      fileData = { files: [file], title: "야바위 아저씨", text: full };
      if (!(navigator.canShare && navigator.canShare(fileData))) fileData = null;
    } catch (e) { fileData = null; }
    navigator.share(fileData || { title: "야바위 아저씨", text: full }).catch((err) => {
      if (err && err.name !== "AbortError") copyShareLink();
    });
  };
  const handleSaveImage = () => {
    let dataUrl;
    try {
      dataUrl = drawShareCanvas(phase === "win", level, shareUrl()).toDataURL("image/png");
    } catch (e) { showToast("이미지 생성에 실패했어요"); return; }
    if (isTouchDevice()) { setPreviewImg(dataUrl); return; }
    try {
      const url = URL.createObjectURL(dataURLtoBlob(dataUrl));
      const a = document.createElement("a");
      a.href = url;
      a.download = "야바위-결과.png";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast("이미지가 저장됐어요 📥");
      setTimeout(() => URL.revokeObjectURL(url), 30000);
    } catch (e) { showToast("이미지 저장에 실패했어요"); }
  };

  const showFaces = phase === "showcase" || phase === "reveal" || phase === "result";
  const locked = phase !== "guess";

  return (
    <div className="cabinet">
      <div className="title">🃏 야바위 아저씨 🃏</div>
      <div className="subtitle">손은 눈보다 빠르다 · 클로버를 찾아라</div>

      {phase === "win" ? (
        <div className="win-screen">
          <div className="confetti-wrap">
            {CONFETTI.map((e, i) => (
              <span key={i} className="confetti" style={{ left: `${6 + i * 7}%`, animationDelay: `${(i % 5) * 0.3}s` }}>{e}</span>
            ))}
          </div>
          <div className="win-trophy">🏆</div>
          <div className="win-title">전설의 타짜</div>
          <div className="win-sub">STAGE 10 올클리어!</div>
          <div className="stage-scene">
            <div className="ahjussi">🧔🏻</div>
            <div className="speech-bubble" key={message}>{message}</div>
          </div>
          {/* 쿠팡 파트너스 위젯(레트로 게임기) — iframe 속성이 JSX에서 깨지지 않게 문자열 그대로 삽입 */}
          <div className="coupang-slot">
            <span>🕹️ 아저씨 추천템 · 레트로 게임기</span>
            <div dangerouslySetInnerHTML={{ __html: '<iframe src="https://coupa.ng/coaWpZ" width="120" height="240" frameborder="0" scrolling="no" referrerpolicy="unsafe-url" browsingtopics></iframe>' }} />
            <span className="coupang-disclaimer">이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</span>
          </div>
        </div>
      ) : (
        <React.Fragment>
          <div className="hud">
            <div className="stage-badge">STAGE {String(level).padStart(2, "0")}</div>
            <div className="hearts">
              {[0, 1, 2].map((i) => (
                <span key={i} className={"heart" + (i >= hearts ? " lost" : "")}>
                  {i >= hearts ? "💔" : "💗"}
                </span>
              ))}
            </div>
          </div>

          <div className="stage-scene">
            <div className={"ahjussi" + (taunting ? " taunt" : "")}>🧔🏻</div>
            <div className="speech-bubble" key={message}>{message}</div>
          </div>

          <div className="board">
            {(() => { const slotX = getSlotX(cards.length); return cards.map((c) => {
              let frontClass = "card-face card-front";
              if (c.isWinner) frontClass += " is-winner";
              if (pickedId === c.id && phase === "result") {
                frontClass += c.isWinner ? " picked-correct" : " picked-wrong";
              }
              // showcase 동안 당첨 카드는 보드 가운데에 크게 떠 있다가, reveal로 넘어가면 제자리로 슬라이드
              const showcasing = phase === "showcase" && c.isWinner;
              const introMove = phase === "showcase" || phase === "reveal";
              return (
                <div
                  key={c.id}
                  className={"card" + (locked ? " locked" : "")}
                  style={{
                    transform: showcasing
                      ? `translateX(${(BOARD_W - CARD_W) / 2}px) translateY(6px) scale(1.6)`
                      : `translateX(${slotX[c.slot]}px)`,
                    transitionDuration: introMove ? "600ms" : `${cardTransitionMs}ms`,
                    zIndex: c.isWinner && introMove ? 5 : undefined,
                  }}
                  onClick={() => handlePick(c.id)}
                >
                  <div className={"card-inner" + (showFaces ? " face-up" : "")}>
                    <div className="card-face card-back"></div>
                    <div className={frontClass}>{c.isWinner ? "🍀" : "❌"}</div>
                  </div>
                </div>
              );
            }); })()}
          </div>

          <div className="footnote">
            섞는 속도: {swapDurationMs}ms/회 · {swapCount}회 섞음 (레벨이 오를수록 빨라짐)
          </div>
        </React.Fragment>
      )}

      <div className="controls">
        {phase === "idle" && (
          <button className="btn" onClick={handleStart}>게임 시작</button>
        )}
        {(phase === "gameover" || phase === "win") && (
          <React.Fragment>
            <button className="btn" onClick={() => setShareOpen(true)}>결과 공유</button>
            <button className="btn ghost" onClick={handleRetry}>다시 도전</button>
          </React.Fragment>
        )}
      </div>

      {shareOpen && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setShareOpen(false); }}>
          <div className="modal-box">
            <button className="modal-close" onClick={() => setShareOpen(false)}>✕</button>
            <div className="modal-title">결과 공유하기</div>
            <button className="btn" onClick={handleShareImage}>🖼️ 이미지로 공유</button>
            <button className="btn" onClick={handleShareLink}>🔗 링크 공유하기</button>
            <button className="btn" onClick={handleSaveImage}>📥 이미지 저장</button>
          </div>
        </div>
      )}
      {previewImg && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setPreviewImg(null); }}>
          <div className="modal-box">
            <button className="modal-close" onClick={() => setPreviewImg(null)}>✕</button>
            <div className="modal-title">길게 눌러 저장하세요</div>
            <img className="share-preview-img" src={previewImg} alt="야바위 결과 이미지" />
          </div>
        </div>
      )}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  var __out = Babel.transform(__src, { presets: [["react", { runtime: "classic" }]] }).code;
  var __el = document.createElement("script");
  __el.textContent = __out;
  document.body.appendChild(__el);
