  .btn:hover, .btn:focus-visible { background: var(--accent-deep); outline: 2px solid var(--accent); outline-offset: 2px; }
  .btn.ghost { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); box-shadow: none; }
  .btn.ghost:hover { background: var(--accent-soft); }
  .option {
    display: block; width: 100%; text-align: left; cursor: pointer;
    background: var(--bg); border: 1.5px solid var(--line); color: var(--ink);

  .option:hover, .option:focus-visible { border-color: var(--accent); background: var(--accent-soft); outline: none; }

<script>
// ── 4단계 레벨 정보 (문항 난이도 진행 순서: 쉬움→어려움) ──────────────────────────
const LEVELS = {
  1: { label: "Lv.1 요즘애들", theme: "기초 신조어", color: "#7CFC00", image: "images/level1-insa.jpg" },
  2: { label: "Lv.2 영크크", theme: "직장인 신조어", color: "#FFD700", image: "images/level2-cafe.jpg" },
  3: { label: "Lv.3 늙크크", theme: "위험 신조어", color: "#FF8C00", image: "images/level3-elder.jpg" },
  4: { label: "Lv.4 딸피단계", theme: "최종보스 신조어", color: "#FF1744", image: "images/level4-dog.jpg", blink: true }
};

// ── 10문항 (레벨 1:2문항, 2:3문항, 3:3문항, 4:2문항) ──────────────────────────
const QUESTIONS = [
  { level:1, q:"신조어 '자만추'의 진짜 뜻은?", correct:"자연스러운 만남 추구", wrong:["자신감 만땅인 만두 추가요!","자전거만 타는 추남"],
    explain:"\"자만추\"는 자연스러운 만남입니다! 만두 추가 고르신 당신, 저녁은 만두전골인가요?" },
  { level:1, q:"겨울철 필수 유행어 '얼죽아'의 진짜 뜻은?", correct:"얼어 죽어도 아이스 아메리카노", wrong:["얼굴이 죽상인 아저씨","얼굴이 죽여주는 아이돌"],
    explain:"영하에도 아아를 고집하는 뚝심입니다! '죽상인 아저씨' 고르신 분, 거울 보며 눈물 닦으세요." },

  { level:2, q:"직장인 눈물 치트키 '내또출'의 진짜 뜻은?", correct:"내일 또 출근이야...", wrong:["내 또래 중에 출가(스님이 됨)한 사람","내일 또 출발하자"],
    explain:"눈물의 \"내일 또 출근\"입니다. 불교적 해탈을 꿈꾸며 '출가' 고르신 분은 속세를 떠나십시오." },
  { level:2, q:"마음을 비우는 밈 '복세편살'의 진짜 뜻은?", correct:"복잡한 세상 편하게 살자", wrong:["복날에 세 마리 편하게 삶아 먹자","복사기 세 대 편하게 살 사람"],
    explain:"복잡한 세상 편하게 살자는 뜻입니다. '복날 닭 세 마리' 생각에 벌써 침 흘리셨나요?" },
  { level:2, q:"일과 삶의 균형 '워라밸'의 진짜 뜻은?", correct:"워크 앤 라이프 밸런스", wrong:["워메, 라면 끓이는데 밸(벨)이 울리네!","워드 치다 라면 쏟고 밸런스 무너짐"],
    explain:"일과 삶의 균형을 뜻합니다! 면 불기 전에 벨 소리 듣고 뛰어가신 분, 진정하세요." },

  { level:3, q:"유행어 '디토(Ditto)'의 진짜 뜻은?", correct:"영어로 '동감', '마찬가지'", wrong:["술 많이 마셔서 속이 안 좋아 \"디(뒤)토\" 하는 중","디지털 토론회"],
    explain:"뉴진스의 노래로 핫한 '나도 동감'입니다! 변기 잡고 '뒤로 토하는' 숙취 상황이 아닙니다." },
  { level:3, q:"현대인을 풍자한 신조어 '스몸비'의 진짜 뜻은?", correct:"스마트폰 + 좀비 (폰만 보며 걷는 사람)", wrong:["스파게티 먹으며 몸을 흔드는 비만 비둘기","스마트폰 쓰는 좀도둑"],
    explain:"스마트폰 좀비를 뜻합니다! '스파게티 먹는 비둘기' 비주얼을 상상하신 당신, 뇌 정지 오셨나요?" },
  { level:3, q:"정보만 홀랑 빼먹으려는 사람을 뜻하는 '핑프'의 진짜 뜻은?", correct:"핑거 프린세스 / 프린스", wrong:["핑크색 프릴 원피스 입고 수박 깨는 공주","핑크색 프링글스"],
    explain:"검색 안 하고 핑거만 놀리는 게으름쟁이입니다! '수박 깨는 핑크 공주' 상상력에 박수를 보냅니다." },

  { level:4, q:"초딩들의 필수 식사 코스 '마라탕후루'의 진짜 뜻은?", correct:"마라탕 먹고 후식으로 탕후루 먹기", wrong:["마라톤 뛰고 라면 먹고 탕수육 먹는 후덕한 루저","마라탕에 탕후루 담가 먹기"],
    explain:"마라탕 후 탕후루 코스입니다! '마라톤 후 탕수육 먹는 루저' 고르신 분, 거울 치료 시급합니다." },
  { level:4, q:"취준생들의 로망 대기업을 묶은 '네카라쿠배'의 진짜 뜻은?", correct:"네이버, 카카오, 라인, 쿠팡, 배달의민족", wrong:["네 바퀴 카트 타고 라면 먹으러 가는 쿠키 굽는 배달원","네모난 카드 들고 라이브 커머스 구경하는 배트맨"],
    explain:"대표 IT 대기업 5사입니다! '카트 타는 쿠키 배달원'을 선택한 당신, 완전히 딸피 상태 확정입니다!" }
];

let current = 0;
let score = 0;
let answered = false;
let timerInterval = null;
let timeLeft = 10;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTest() {
  document.getElementById("screen-start").classList.add("hidden");
  document.getElementById("screen-quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  answered = false;
  const item = QUESTIONS[current];
  const lv = LEVELS[item.level];

  document.getElementById("qnum").textContent = `Q${current + 1} / ${QUESTIONS.length}`;
  document.getElementById("level-image").src = lv.image;
  const badge = document.getElementById("level-badge");
  badge.textContent = lv.label;
  badge.style.background = lv.color;
  badge.classList.toggle("blink", !!lv.blink);
  document.getElementById("level-theme").textContent = lv.theme;
  document.getElementById("qtext").textContent = item.q;
  document.getElementById("progress-fill").style.width = `${(current / QUESTIONS.length) * 100}%`;

  const opts = shuffle([item.correct, ...item.wrong]);
  const box = document.getElementById("options");
  box.innerHTML = "";
  opts.forEach(text => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = text;
    btn.onclick = () => pick(text === item.correct, text, btn);
    box.appendChild(btn);
  });

  box.style.pointerEvents = "none";
  requestAnimationFrame(() => requestAnimationFrame(() => { box.style.pointerEvents = ""; }));

  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = 10;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    if (timeLeft <= 0) {
      timeLeft = 0;
      updateTimerUI();
      clearInterval(timerInterval);
      if (!answered) pick(false, null, null);
      return;
    }
    updateTimerUI();
  }, 100);
}

function updateTimerUI() {
  document.getElementById("timer-fill").style.width = `${(timeLeft / 10) * 100}%`;
  document.getElementById("timer-num").textContent = Math.ceil(timeLeft) + "초";
}

function pick(isCorrect, chosenText, btnEl) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const item = QUESTIONS[current];
  document.querySelectorAll("#options .option").forEach(b => {
    b.disabled = true;
    if (b.textContent === item.correct) b.classList.add("correct");
    else if (b === btnEl) b.classList.add("wrong");
  });

  if (isCorrect) score += 10;
  showFeedback(isCorrect, item, chosenText);
}

function showFeedback(isCorrect, item, chosenText) {
  document.getElementById("fb-icon").textContent = isCorrect ? "✅" : (chosenText === null ? "⏰" : "❌");
  document.getElementById("fb-title").textContent = isCorrect ? "정답입니다!" : (chosenText === null ? "시간 초과!" : "아쉬워요, 오답!");
  document.getElementById("fb-answer").textContent = "정답: " + item.correct;
  document.getElementById("fb-explain").textContent = item.explain;
  document.getElementById("feedback-modal").classList.remove("hidden");
}

function nextQuestion() {
  document.getElementById("feedback-modal").classList.add("hidden");
  current++;
  if (current < QUESTIONS.length) showQuestion();
  else showResult();
}

// 점수가 높을수록 '요즘애들'(젊음), 낮을수록 '딸피단계'(늙음)로 판정 —
// 문항 난이도 레벨(Lv1=쉬움~Lv4=어려움)과는 별개로 결과 등급은 점수 기준 내림차순
function getGrade(s) {
  if (s <= 20) return { grade:"Lv.4 딸피단계", emoji:"💀", color:"#FF1744",
    desc:"이건 좀... 신조어는커녕 최신 유행이 뭔지도 가물가물하시죠? 완전히 딸피 상태 확정, 화석 인증 도장 쾅!" };
  if (s <= 50) return { grade:"Lv.3 늙크크", emoji:"😵", color:"#FF8C00",
    desc:"몇 개는 건지셨네요! 그래도 '늙크크'는 피할 수 없는 운명... 조카한테 좀 더 배우셔야겠어요." };
  if (s <= 80) return { grade:"Lv.2 영크크", emoji:"😎", color:"#FFD700",
    desc:"오, 나름 감 있으신데요? '영크크' 인증! 트렌드 살짝 놓쳤지만 아직 반박 가능한 수준입니다." };
  return { grade:"Lv.1 요즘애들", emoji:"🔥", color:"#7CFC00",
    desc:"당신은 그냥 신조어 네이티브! 완전체 '요즘애들' 인증, 조카들도 놀랄 신조어 마스터입니다." };
}

function showResult() {
  document.getElementById("screen-quiz").classList.add("hidden");
  document.getElementById("screen-result").classList.remove("hidden");
  const g = getGrade(score);
  document.getElementById("r-emoji").textContent = g.emoji;
  document.getElementById("r-visual").style.borderColor = g.color;
  document.getElementById("r-visual").style.boxShadow = `0 0 24px ${g.color}55`;
  document.getElementById("r-grade").textContent = g.grade;
  document.getElementById("r-title").textContent = g.grade.split(" ")[1] || g.grade;
  document.getElementById("r-score").textContent = score + "점";
  document.getElementById("r-correct").textContent = `${score / 10} / ${QUESTIONS.length}문제 정답 (100점 만점)`;
  document.getElementById("r-desc").textContent = g.desc;
  window.scrollTo({ top: 0 });
}

function openShareModal() {
  document.getElementById("shareModal").classList.remove("hidden");
}

function closeShareModal() {
  document.getElementById("shareModal").classList.add("hidden");
}

function getShareUrl() {
  return location.origin + location.pathname;
}

function getShareText() {
  const g = getGrade(score);
  return `나의 신조어 감성은 「${g.grade}」(${score}점)! 너는 요즘애들일까 딸피단계일까? 🧟`;
}

function copyShareLink(appName) {
  const full = getShareText() + "\n" + getShareUrl();
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(full).then(() => {
      showToast(appName + "에 붙여넣기만 하면 돼요! (링크 복사됨 📋)");
    }).catch(() => {
      prompt("아래 내용을 복사해서 " + appName + "에 붙여넣으세요:", full);
    });
  } else {
    prompt("아래 내용을 복사해서 " + appName + "에 붙여넣으세요:", full);
  }
}

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove("show"), 2600);
}

function dataURLtoBlob(dataUrl) {
  const parts = dataUrl.split(",");
  const mime = (parts[0].match(/:(.*?);/) || [,"image/png"])[1];
  const binary = atob(parts[1]);
  const u8arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) u8arr[i] = binary.charCodeAt(i);
  return new Blob([u8arr], { type: mime });
}

function wrapLines(ctx, text, maxWidth) {
  const words = text.split(" ");
  let line = "";
  const lines = [];
  words.forEach(word => {
    const test = line ? line + " " + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

function drawLines(ctx, lines, x, y, lineHeight) {
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
  return y + lines.length * lineHeight;
}

// ── 결과 카드를 Canvas에 직접 그려서 공유용 이미지 생성 (외부 라이브러리 불필요) ──
function drawShareCanvas(g) {
  const canvas = document.getElementById("share-canvas");
  const ctx = canvas.getContext("2d");
  const W = 1080, H = 1350;
  canvas.width = W; canvas.height = H;
  const cx = W / 2;

  ctx.fillStyle = "#0a0a0f";
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = "center";
  ctx.fillStyle = "#39ff14";
  ctx.font = "bold 30px 'Malgun Gothic', sans-serif";
  ctx.fillText("늙었냐크크? 신조어 감성 테스트 🧟", cx, 110);

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, 340, 170, 0, Math.PI * 2);
  ctx.closePath();
  ctx.fillStyle = "#16161f";
  ctx.fill();
  ctx.lineWidth = 6;
  ctx.strokeStyle = g.color;
  ctx.stroke();
  ctx.restore();
  ctx.font = "160px sans-serif";
  ctx.textBaseline = "middle";
  ctx.fillText(g.emoji, cx, 350);
  ctx.textBaseline = "alphabetic";

  ctx.fillStyle = g.color;
  ctx.font = "bold 40px 'Malgun Gothic', sans-serif";
  ctx.fillText(g.grade, cx, 570);

  ctx.fillStyle = "#39ff14";
  ctx.font = "bold 46px 'Malgun Gothic', sans-serif";
  ctx.fillText(`${score}점 / 100점`, cx, 650);
  ctx.fillStyle = "#93939f";
  ctx.font = "28px 'Malgun Gothic', sans-serif";
  ctx.fillText(`${score / 10}문제 정답 / ${QUESTIONS.length}문제`, cx, 696);

  ctx.fillStyle = "#eaeaf2";
  ctx.font = "26px 'Malgun Gothic', sans-serif";
  const descLines = wrapLines(ctx, g.desc, W - 180);
  drawLines(ctx, descLines, cx, 780, 40);

  ctx.fillStyle = "#39ff14";
  ctx.fillRect(0, H - 140, W, 140);
  ctx.fillStyle = "#05130a";
  ctx.font = "bold 34px 'Malgun Gothic', sans-serif";
  ctx.fillText("나도 신조어 감성 테스트 하러가기 →", cx, H - 78);
  ctx.font = "24px 'Malgun Gothic', sans-serif";
  ctx.fillText(getShareUrl().replace(/^https?:\/\//, ""), cx, H - 38);

  return canvas;
}

function showImagePreviewModal(dataUrl) {
  const root = document.getElementById("modal-root");
  root.innerHTML =
    '<div class="modal" id="image-modal-backdrop">' +
      '<div class="modal-content" style="text-align:center;">' +
        '<button class="modal-close" id="image-modal-close">✕</button>' +
        '<h3>이미지를 길게 눌러 저장하세요</h3>' +
        '<img src="' + dataUrl + '" alt="테스트 결과 이미지" style="width:100%;border-radius:12px;border:1px solid var(--line);margin:12px 0 4px;">' +
      '</div>' +
    '</div>';
  const closeModal = () => { root.innerHTML = ""; };
  document.getElementById("image-modal-backdrop").addEventListener("click", e => { if (e.target.id === "image-modal-backdrop") closeModal(); });
  document.getElementById("image-modal-close").addEventListener("click", closeModal);
}

function isTouchDevice() {
  return navigator.maxTouchPoints > 0 || "ontouchstart" in window;
}

function handleSaveImage() {
  const g = getGrade(score);
  let dataUrl;
  try {
    dataUrl = drawShareCanvas(g).toDataURL("image/png");
  } catch (e) {
    showToast("이미지 생성에 실패했습니다.");
    return;
  }

  if (isTouchDevice()) {
    showImagePreviewModal(dataUrl);
    return;
  }
  try {
    const blob = dataURLtoBlob(dataUrl);
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = "내-신조어감성-테스트.png";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast("이미지가 저장되었습니다 📥");
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  } catch (e) {
    showToast("이미지 저장에 실패했습니다.");
  }
}

function handleShare() {
  const g = getGrade(score);
  const fullText = getShareText() + "\n" + getShareUrl();

  if (!navigator.share) {
    copyShareLink("공유하려는 앱");
    return;
  }

  let fileShareData = null;
  try {
    const dataUrl = drawShareCanvas(g).toDataURL("image/png");
    const blob = dataURLtoBlob(dataUrl);
    const file = new File([blob], "내-신조어감성-테스트.png", { type: "image/png" });
    fileShareData = { files: [file], title: "늙었냐크크? 신조어 감성 테스트", text: fullText };
    if (!(navigator.canShare && navigator.canShare(fileShareData))) fileShareData = null;
  } catch (e) {
    fileShareData = null;
  }

  const shareData = fileShareData || { title: "늙었냐크크? 신조어 감성 테스트", text: fullText };
  navigator.share(shareData).catch(err => {
    if (err && err.name !== "AbortError") copyShareLink("공유하려는 앱");
  });
}

function shareTestLink() {
  const fullText = "너의 신조어 감성은 몇 단계? 🧟 1분 안에 알아보는 진짜 신조어 테스트\n" + getShareUrl();
  if (!navigator.share) {
    copyShareLink("공유하려는 앱");
    return;
  }
  navigator.share({ title: "늙었냐크크? 신조어 감성 테스트", text: fullText }).catch(err => {
    if (err && err.name !== "AbortError") copyShareLink("공유하려는 앱");
  });
}
