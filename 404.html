<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 | 테스트빵</title>
<meta name="robots" content="noindex">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8471384112148064"
     crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #fdf8f0; --surface: #ffffff; --ink: #3a2e1f; --ink-soft: #8a7a63;
    --line: #ecdfc7; --accent: #c9974a; --accent-deep: #a8762e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
    line-height: 1.6; display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px; text-align: center; }
  .code { font-size: 72px; font-weight: 900; color: var(--accent); margin: 0; }
  h1 { font-size: 24px; margin: 16px 0 8px; }
  p { color: var(--ink-soft); font-size: 15px; margin: 0 0 32px; }
  .btn {
    display: inline-block; padding: 12px 28px; background: var(--accent);
    color: #fff; text-decoration: none; border-radius: 8px;
    font-weight: 700; font-size: 15px; transition: transform .15s, box-shadow .15s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(120, 90, 40, .2);
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="code">404</p>
  <h1>페이지를 찾을 수 없습니다</h1>
  <p>요청하신 페이지가 없거나 이동했을 수 있습니다.</p>
  <a href="/" class="btn">홈으로 돌아가기</a>
</div>
</body>
</html>
